#XCOL: Column label for claim type
ClaimType=Type

#XCOL: Column label for claim amount
ClaimAmount=Amount

#XCOL: Column label for currency
Currency=Currency

#XCOL: Column label for status
Status=Status

#XCOL: Column label for creation date
CreatedAt=Created

