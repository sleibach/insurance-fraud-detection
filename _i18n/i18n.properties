# ─── Entity names ─────────────────────────────────────────────────────────────

#XTIT: Singular entity name
Claim=Claim

#XTIT: Plural entity name
Claims=Claims

# ─── List Report columns ──────────────────────────────────────────────────────

#XCOL: Column label for claim title
