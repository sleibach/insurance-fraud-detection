#XTIT: General information facet label
GeneralInformation=General Information

#XTIT: Attachments facet label
Attachments=Attachments

#XTIT: Structured data facet label
StructuredData=Structured Data

#XTIT: AI analysis facet label
AIAnalysis=AI Analysis

#XTIT: AI evaluation field group label
AIEvaluation=AI Evaluation

#XTIT: Claim details field group label
ClaimDetails=Claim Details

